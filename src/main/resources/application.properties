# 1. Cấu hình kết nối PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/lms_db
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Cấu hình JPA (Hibernate)
# Yêu cầu Hibernate tự động thêm các cột còn thiếu vào Database
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 3. Đặt port cho server (Mặc định là 8080)
server.port=8080
# Chỉ định Swagger chỉ quét các API trong thư mục controller
springdoc.packages-to-scan=vn.edu.hutech.lms_api.controller

springdoc.override-with-generic-response=false

# --- FILE UPLOAD CONFIGURATION ---
# Thư mục chứa file tải lên (sẽ tự động tạo trong thư mục gốc của project)
file.upload-dir=uploads

# Tăng giới hạn kích thước file tải lên thành 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- CLOUDINARY CONFIGURATION ---
# Dat true va dien thong tin Cloudinary de upload PDF chung chi len cloud.
# Neu de false, he thong dung link download local nhu hien tai.
cloudinary.enabled=false
cloudinary.cloud-name=
cloudinary.api-key=
cloudinary.api-secret=
